name: "build"
description: "build project and run tests"
runs:
  using: "composite"
  steps:
    - name: build and run tests
      shell: bash
      run: |
        npm ci
        npm run ci

    # upload diffs if the CI fails
    - name: upload diffs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: screenshot-diffs
        path: test/diffs/**/*.png
        if-no-files-found: ignore